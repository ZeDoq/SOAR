<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SOAR Control Room</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="glow"></div>
    <header class="hero">
      <div>
        <p class="eyebrow">Agent-Based SOAR</p>
        <h1>Control Room</h1>
        <p class="subtitle">
          Simulated response pipeline for suspicious IP activity.
        </p>
      </div>
      <div class="api-config">
        <label for="apiBase">API Base</label>
        <input id="apiBase" value="http://127.0.0.1:8000" />
        <button id="refreshBtn">Refresh</button>
      </div>
    </header>

    <main class="grid">
      <section class="panel">
        <div class="panel-header">
          <h2>Alerts</h2>
          <button id="importBtn">Import Sample Alerts</button>
        </div>
        <ul id="alertsList" class="list"></ul>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Playbook Runs</h2>
        </div>
        <ul id="runsList" class="list"></ul>
      </section>

      <section class="panel wide">
        <div class="panel-header">
          <h2>Run Detail</h2>
        </div>
        <div id="runDetail" class="detail">
          <p>Select an alert or run to view details.</p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
