services:
  soar:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SOAR_DB_PATH=data/soar.db
    volumes:
      - soar-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  soar-data:
